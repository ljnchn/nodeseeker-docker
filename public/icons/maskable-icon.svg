<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="signalGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 纯色背景，适合 maskable -->
  <rect x="0" y="0" width="100" height="100" fill="url(#bgGradient)"/>
  
  <!-- 信号塔底座 -->
  <path d="M50 75 L45 85 L55 85 Z" fill="#64748b"/>
  <line x1="50" y1="75" x2="50" y2="45" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
  
  <!-- 天线 -->
  <line x1="50" y1="45" x2="50" y2="25" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="50" cy="22" r="3" fill="#3b82f6"/>
  
  <!-- 信号波纹 -->
  <path d="M58 35 Q70 35 70 50" fill="none" stroke="url(#signalGradient)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M62 30 Q78 30 78 50" fill="none" stroke="url(#signalGradient)" stroke-width="2" stroke-linecap="round"/>
  <path d="M42 35 Q30 35 30 50" fill="none" stroke="url(#signalGradient)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M38 30 Q22 30 22 50" fill="none" stroke="url(#signalGradient)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 状态指示点 -->
  <circle cx="50" cy="55" r="4" fill="#10b981"/>
</svg>